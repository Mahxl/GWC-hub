<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GWC Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">
<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-md border-4 border-teal-600">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-gray-900">GWC ADMIN LOGIN</h1>
    </div>

    {% if error %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" class="space-y-6">
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Email Address</label>
            <input type="email" name="email" required 
                   class="w-full border border-gray-300 p-3 rounded focus:outline-none focus:ring-2 focus:ring-teal-500">
        </div>

        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Password</label>
            <input type="password" name="password" required 
                   class="w-full border border-gray-300 p-3 rounded focus:outline-none focus:ring-2 focus:ring-teal-500">
        </div>

        <button type="submit" class="w-full bg-teal-600 text-white font-bold py-3 rounded hover:bg-teal-700 transition">
            Log In
        </button>
    </form>
</div>
</body>
</html>
